site_name: Renesas RZ AOSP
site_description: Renesas RZ Software Package for AOSP
site_url: https://renesas-rz.github.io/rz_aosp
site_author: Renesas Electronics Corporation

repo_name: rz_aosp
repo_url: https://github.com/renesas-rz/rz_aosp

nav:
  - Overview: index.md
  - Release Notes: release_note/index.md
  - Quick Start Guides: quick_start_guide/index.md
  - AI Application Overview: drp_ai_overview/index.md
  - AI Application Porting Guide: drp_ai_porting_guide/index.md
  - How to build RZ AOSP from Source Code: rz_aosp_build/index.md
  - Application Notes: rz_aosp_note/index.md
  - FAQ: faq/index.md

theme:
  name: material
  custom_dir: docs/_themes
  favicon: assets/icons/6723.T.png
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - navigation.instant
    - navigation.instant.progress
    - navigation.prune
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.integrate
    - toc.follow
  nav_top:
    btns:
      - name: Go to Renesas RZ Linux Solutions homepage
        url: https://renesas-rz.github.io/rz_solution/
        image: assets/images/Explore_more_RZ_Linux_Solutions.png
        new_tab: true
        mobile_text_link: false
    no_title: true
  palette:
    primary: custom

copyright: '&copy;2024-2026 Renesas Electronics Corporation.'

extra:
  header_link: true
  footer_link:
    - link: https://renesas-rz.github.io/rz_solution/legal_notices/
      name: Notices & Terms
      new_tab: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/renesas-rz
      name: Renesas RZ Software on GitHub
    - icon: fontawesome/solid/house
      link: https://www.renesas.com/
      name: Go to Renesas.com website
  version:
    provider: mike

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/card.css

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - assets/javascripts/tablesort.js

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - markdown_grid_tables
  - md_in_html
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      preserve_tabs: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  # search must be in the top one
  - search
  - exclude:
      glob:
        - _*
        - release_note/_*/*
        - quick_start_guide/_*/*
        - drp_ai_overview/_*/*
        - drp_ai_porting_guide/_*/*
        - rz_aosp_build/_*/*
        - rz_aosp_note/_*/*
        - faq/_*/*
  - glightbox
  - include-markdown
  - mkdocs-video
  - minify_html:
      keep_closing_tags: true
      keep_html_and_head_opening_tags: true
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
          remove_comments: true
      cache_safe: true
      js_files:
          - assets/javascripts/tablesort.js
      css_files:
          - assets/stylesheets/extra.css
  - table-reader
  # macros must be in the bottom one
  - macros
